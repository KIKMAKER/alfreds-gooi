<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">

  <!-- Background -->
  <rect width="1080" height="1350" fill="#013f3a"/>

  <!-- ── LOGO PLACEHOLDER — replace with real vector logo (light version) ── -->
  <text x="80" y="100" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="54" fill="white">gooi</text>

  <!-- Slide counter -->
  <text x="1000" y="68" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="white">02 / 03</text>

  <!-- Label -->
  <text x="80" y="310" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2" fill="#FBB718">APARTMENT BLOCKS · WEEKLY SERVICE</text>

  <!-- Big stat -->
  <text x="80" y="550" font-family="Georgia, 'Libre Baskerville', serif" font-size="200" font-weight="bold" fill="#FBB718">156 kg</text>

  <!-- Stat label -->
  <text x="80" y="630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="rgba(255,255,255,0.65)">per unit, per year — diverted from landfill.</text>

  <!-- Divider line -->
  <line x1="80" y1="710" x2="480" y2="710" stroke="#FBB718" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Description lines -->
  <text x="80" y="790" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" fill="white">Alfred collects from your building every week.</text>
  <text x="80" y="848" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" fill="white">Body corporate manages one service, one invoice.</text>
  <text x="80" y="906" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" fill="white">Scraps become compost for local Cape Town farms.</text>

  <!-- Bottom tag -->
  <text x="80" y="1200" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#FBB718">Cape Town · door-to-block</text>

  <!-- Footer rule -->
  <line x1="80" y1="1270" x2="1000" y2="1270" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Footer text -->
  <text x="80" y="1315" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" font-weight="700" fill="white">gooi.me</text>
  <text x="1000" y="1315" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" fill="rgba(255,255,255,0.55)">@gooi_capetown</text>

</svg>
