<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">

  <!-- Background -->
  <rect width="1080" height="1350" fill="white"/>

  <!-- ── LOGO PLACEHOLDER — replace with real vector logo ── -->
  <text x="80" y="100" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="54" fill="#013f3a">gooi</text>

  <!-- Slide counter -->
  <text x="1000" y="68" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#013f3a">01 / 03</text>

  <!-- Decorative dots (graduated, top-right) -->
  <circle cx="950" cy="310" r="42" fill="#FBB718"/>
  <circle cx="878" cy="398" r="30" fill="#FBB718"/>
  <circle cx="828" cy="466" r="18" fill="#FBB718"/>

  <!-- Headline -->
  <text x="80" y="430" font-family="Georgia, 'Libre Baskerville', serif" font-size="118" font-weight="bold" fill="#013f3a">Your building</text>
  <text x="80" y="558" font-family="Georgia, 'Libre Baskerville', serif" font-size="118" font-weight="bold" fill="#013f3a">can compost.</text>

  <!-- Tagline -->
  <text x="80" y="668" font-family="Georgia, 'Libre Baskerville', serif" font-style="italic" font-size="50" fill="#108A63">every unit. every week.</text>

  <!-- Price pill -->
  <rect x="80" y="748" width="346" height="96" rx="48" fill="#FBB718"/>
  <text x="253" y="808" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#013f3a">get a quote →</text>

  <!-- Body text -->
  <text x="80" y="920" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#777">Managed weekly collection for Cape Town apartment</text>
  <text x="80" y="958" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#777">blocks. One service. One invoice. Real impact.</text>

  <!-- Footer rule -->
  <line x1="80" y1="1270" x2="1000" y2="1270" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Footer text -->
  <text x="80" y="1315" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" font-weight="700" fill="#013f3a">gooi.me</text>
  <text x="1000" y="1315" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" fill="#888">@gooi_capetown</text>

</svg>
