<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- Background: top white, bottom dark green split -->
  <rect width="1280" height="720" fill="#013f3a"/>
  <rect width="1280" height="390" fill="white"/>

  <!-- Left accent bar (top only) -->
  <rect x="0" y="0" width="8" height="390" fill="#013f3a"/>

  <!-- Section label -->
  <text x="36" y="52"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="10" letter-spacing="2.5" fill="#108A63" font-weight="600">HOW PRICING WORKS</text>

  <!-- Title -->
  <text x="36" y="100"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="46" font-weight="bold" fill="#013f3a">Three simple components.</text>

  <!-- ─── Pricing boxes ─── -->

  <!-- Box 1: Collection fee -->
  <rect x="36" y="132" width="370" height="230" rx="16"
        fill="white" stroke="#e8eeec" stroke-width="1.5"/>
  <!-- coloured top edge -->
  <rect x="36" y="132" width="370" height="6" rx="3" fill="#013f3a"/>
  <text x="221" y="220" text-anchor="middle" font-size="42">🚛</text>
  <text x="221" y="264" text-anchor="middle"
        font-family="Georgia, serif" font-size="19" font-weight="bold" fill="#013f3a">Weekly collection fee</text>
  <text x="221" y="292" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">A fixed fee per weekly visit.</text>
  <text x="221" y="310" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">Covers Alfred's collection service</text>
  <text x="221" y="328" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">regardless of volume on the day.</text>
  <rect x="96" y="342" width="250" height="24" rx="12" fill="#f0f7f4"/>
  <text x="221" y="358" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#108A63" font-weight="600" letter-spacing="0.3">Per building · per collection</text>

  <!-- Box 2: Volume processing -->
  <rect x="455" y="132" width="370" height="230" rx="16"
        fill="white" stroke="#e8eeec" stroke-width="1.5"/>
  <rect x="455" y="132" width="370" height="6" rx="3" fill="#108A63"/>
  <text x="640" y="220" text-anchor="middle" font-size="42">⚖️</text>
  <text x="640" y="264" text-anchor="middle"
        font-family="Georgia, serif" font-size="19" font-weight="bold" fill="#013f3a">Volume processing fee</text>
  <text x="640" y="292" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">Charged per 45L collection bucket,</text>
  <text x="640" y="310" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">per month. 45L starter buckets are</text>
  <text x="640" y="328" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">R210 each — a one-time purchase.</text>
  <rect x="486" y="342" width="308" height="24" rx="12" fill="#f0f7f4"/>
  <text x="640" y="358" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#108A63" font-weight="600" letter-spacing="0.3">R210/bucket once · then processing/month</text>

  <!-- Box 3: Resident buckets (optional) -->
  <rect x="874" y="132" width="370" height="230" rx="16"
        fill="white" stroke="#e8eeec" stroke-width="1.5"/>
  <rect x="874" y="132" width="370" height="6" rx="3" fill="#FBB718"/>
  <text x="1059" y="220" text-anchor="middle" font-size="42">🪣</text>
  <text x="1059" y="264" text-anchor="middle"
        font-family="Georgia, serif" font-size="19" font-weight="bold" fill="#013f3a">Resident buckets</text>
  <rect x="934" y="274" width="94" height="22" rx="11" fill="rgba(251,183,24,0.15)"/>
  <text x="981" y="289" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#013f3a" font-weight="700" letter-spacing="0.5">OPTIONAL</text>
  <text x="1059" y="320" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">Countertop collection buckets for</text>
  <text x="1059" y="338" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="#525560">each apartment — one-time cost.</text>
  <rect x="934" y="348" width="250" height="24" rx="12" fill="rgba(251,183,24,0.10)"/>
  <text x="1059" y="364" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#013f3a" font-weight="600" letter-spacing="0.3">Per apartment · one-time</text>

  <!-- ─── Bottom CTA section (dark green) ─── -->

  <!-- Payment terms note -->
  <rect x="36" y="416" width="544" height="60" rx="12" fill="rgba(132,203,163,0.12)" stroke="rgba(132,203,163,0.25)" stroke-width="0.75"/>
  <text x="64" y="443"
        font-family="-apple-system, Arial, sans-serif" font-size="13.5" fill="white" font-weight="600">
    6-month subscription (best rate) or month-to-month.
  </text>
  <text x="64" y="463"
        font-family="-apple-system, Arial, sans-serif" font-size="12.5" fill="rgba(255,255,255,0.55)">
    Starter bucket cost paid off after 6 months — ongoing rate is lower.
  </text>

  <!-- CTA heading -->
  <text x="36" y="530"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="38" font-weight="bold" fill="white">Ready to get a quote?</text>
  <text x="36" y="566"
        font-family="-apple-system, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.62)">
    Every building is different — we'll size it for your block.
  </text>

  <!-- Contact buttons -->
  <!-- Email button -->
  <rect x="36" y="596" width="310" height="56" rx="28" fill="#FBB718"/>
  <text x="191" y="629" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="700" fill="#013f3a">
    howzit@gooi.me
  </text>

  <!-- Phone button -->
  <rect x="364" y="596" width="260" height="56" rx="28"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
  <text x="494" y="629" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="600" fill="white">
    083 635 3126
  </text>

  <!-- Right: Queensmead callout -->
  <rect x="700" y="410" width="544" height="270" rx="16" fill="rgba(132,203,163,0.08)" stroke="rgba(132,203,163,0.20)" stroke-width="1"/>
  <text x="722" y="450"
        font-family="-apple-system, Arial, sans-serif" font-size="10" letter-spacing="2" fill="rgba(132,203,163,0.8)" font-weight="600">SEE IT IN ACTION</text>
  <text x="722" y="492"
        font-family="Georgia, serif" font-size="24" font-weight="bold" fill="white">Queensmead Apartments,</text>
  <text x="722" y="522"
        font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#84cba3">Rondebosch</text>
  <text x="722" y="556"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Already collecting weekly. Residents can see</text>
  <text x="722" y="576"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">their building's live impact stats in real time.</text>
  <rect x="722" y="600" width="292" height="30" rx="15" fill="rgba(132,203,163,0.15)" stroke="rgba(132,203,163,0.3)" stroke-width="0.75"/>
  <text x="868" y="619" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#84cba3" font-weight="600">
    gooi.me/blocks/queensmead
  </text>

  <!-- Slide number -->
  <text x="1244" y="710" text-anchor="end"
        font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="rgba(255,255,255,0.20)">5 / 5</text>

</svg>
