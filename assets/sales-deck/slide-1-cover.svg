<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- Background -->
  <rect width="1280" height="720" fill="#013f3a"/>

  <!-- Decorative organic circles — right half -->
  <circle cx="1060" cy="260" r="320" fill="rgba(132,203,163,0.07)"/>
  <circle cx="1180" cy="140" r="210" fill="rgba(132,203,163,0.06)"/>
  <circle cx="960"  cy="460" r="190" fill="rgba(132,203,163,0.05)"/>
  <circle cx="1140" cy="540" r="130" fill="rgba(251,183,24,0.04)"/>
  <circle cx="820"  cy="200" r="100" fill="rgba(132,203,163,0.04)"/>

  <!-- gooi* wordmark -->
  <text x="64" y="74"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-style="italic" font-size="34" font-weight="bold" fill="#FBB718">gooi*</text>

  <!-- Badge -->
  <rect x="64" y="88" width="248" height="22" rx="11"
        fill="rgba(132,203,163,0.18)" stroke="rgba(132,203,163,0.35)" stroke-width="0.75"/>
  <text x="188" y="103" text-anchor="middle"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="10" letter-spacing="2.2" fill="#84cba3" font-weight="600">KITCHEN SCRAPS COLLECTION</text>

  <!-- Main headline -->
  <text x="64" y="232"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="80" font-weight="bold" fill="white">Your building</text>
  <text x="64" y="320"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="80" font-weight="bold" fill="#84cba3">can compost.</text>

  <!-- Sub-headline -->
  <text x="64" y="372"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.60)">
    A managed weekly kitchen scrap collection for apartment
  </text>
  <text x="64" y="396"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.60)">
    blocks and estates in Cape Town.
  </text>

  <!-- Stat callout -->
  <rect x="64" y="444" width="576" height="128" rx="16"
        fill="rgba(251,183,24,0.10)" stroke="rgba(251,183,24,0.28)" stroke-width="1"/>
  <text x="96" y="492"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="44" font-weight="bold" fill="#FBB718">16 tonnes</text>
  <text x="96" y="522"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="rgba(255,255,255,0.72)">of organic waste diverted from landfill in 2025</text>
  <text x="96" y="548"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.40)">
    5.5 tonnes of compost created · emissions saving ≈ driving 37 000 km
  </text>

  <!-- Bottom rule + contact line -->
  <line x1="64" y1="660" x2="700" y2="660" stroke="rgba(255,255,255,0.10)" stroke-width="0.75"/>
  <text x="64" y="682"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="rgba(255,255,255,0.28)">
    gooi.me · howzit@gooi.me · 083 635 3126
  </text>

  <!-- Slide number -->
  <text x="1216" y="700" text-anchor="end"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="rgba(255,255,255,0.22)">1 / 5</text>

</svg>
