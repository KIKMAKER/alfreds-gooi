<?xml version="1.0" encoding="UTF-8" standalone="no"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg width="100%" height="100%" viewBox="0 0 5334 3000" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;"><rect x="0" y="0" width="5333.333" height="3000" style="fill:#fff;"/><text x="150px" y="233.333px" style="font-family:'Helvetica-Bold', 'Helvetica';font-weight:700;font-size:41.667px;fill:#108a63;">W<tspan x="190.369px 221.501px 249.601px 262.219px 274.837px 301.331px 313.949px 349.699px 377.759px 404.252px 430.745px 459.578px 490.71px " y="233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px 233.333px ">HY IT MATTERS</tspan></text><text x="150px" y="466.667px" style="font-family:'Georgia', serif;font-size:216.667px;fill:#013f3a;">Food waste is a bigger problem</text><text x="150px" y="700px" style="font-family:'Georgia', serif;font-size:216.667px;fill:#013f3a;">than most people realise.</text><circle cx="766.667" cy="1283.333" r="183.333" style="fill:#f0f7f4;"/><text x="691.667px" y="1350px" style="font-family:'AppleColorEmoji', 'Apple Color Emoji';font-size:150px;">🗑️</text><g transform="matrix(75,0,0,75,561.460368,1625)"></g><g transform="matrix(75,0,0,75,584.443662,1625)"></g><text x="391.026px" y="1625px" style="font-family:'Georgia', serif;font-size:75px;fill:#013f3a;">Landﬁll is the problem</text><text x="505.619px" y="1741.667px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">30–50% of all waste</text><g transform="matrix(58.333333,0,0,58.333333,1043.93514,1825)"></g><g transform="matrix(58.333333,0,0,58.333333,1060.142008,1825)"></g><text x="418.105px" y="1825px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">is organic — and in landﬁll,</text><text x="414.83px" y="1908.333px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">it produces methane: a gas</text><text x="420.512px" y="1991.667px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">80× more potent than CO₂.</text><path d="M1533.333,1100l0,983.333" style="fill:none;fill-rule:nonzero;stroke:#e8e8e8;stroke-width:4.17px;"/><circle cx="2666.667" cy="1283.333" r="183.333" style="fill:#f0f7f4;"/><text x="2591.667px" y="1350px" style="font-family:'AppleColorEmoji', 'Apple Color Emoji';font-size:150px;">🌱</text><g transform="matrix(75,0,0,75,2933.469645,1625)"></g><g transform="matrix(75,0,0,75,2956.452939,1625)"></g><text x="2318.309px" y="1625px" style="font-family:'Georgia', serif;font-size:75px;fill:#013f3a;">Composting is the ﬁx</text><text x="2329.456px" y="1741.667px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">Composted organic waste</text><text x="2334.355px" y="1825px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">returns nutrients to soil —</text><text x="2298.651px" y="1908.333px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">supporting local farmers and</text><text x="2314.872px" y="1991.667px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">reducing synthetic fertiliser<tspan x="3002.254px " y="1991.667px ">.</tspan></text><path d="M3800,1100l0,983.333" style="fill:none;fill-rule:nonzero;stroke:#e8e8e8;stroke-width:4.17px;"/><circle cx="4566.667" cy="1283.333" r="183.333" style="fill:#f0f7f4;"/><text x="4491.667px" y="1350px" style="font-family:'AppleColorEmoji', 'Apple Color Emoji';font-size:150px;">🏙️</text><g transform="matrix(75,0,0,75,4180.625407,1625)"></g><g transform="matrix(75,0,0,75,4203.007833,1625)"></g><g transform="matrix(75,0,0,75,4225.390259,1625)"></g><text x="4124.815px" y="1625px" style="font-family:'Georgia', serif;font-size:75px;fill:#013f3a;">Oﬃces are the opportunity</text><g transform="matrix(58.333333,0,0,58.333333,4313.210042,1741.666667)"></g><g transform="matrix(58.333333,0,0,58.333333,4329.416911,1741.666667)"></g><text x="4252.655px" y="1741.667px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">Of<tspan x="4313.21px " y="1741.667px ">ﬁ</tspan>ce kitchens generate</text><text x="4237.573px" y="1825px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">large, consistent volumes</text><g transform="matrix(58.333333,0,0,58.333333,4817.488607,1908.333333)"></g><g transform="matrix(58.333333,0,0,58.333333,4833.695475,1908.333333)"></g><text x="4225.069px" y="1908.333px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">every week. <tspan x="4549.32px 4585.038px 4601.245px " y="1908.333px 1908.333px 1908.333px ">A s</tspan>ingle of<tspan x="4817.489px " y="1908.333px ">ﬁ</tspan>ce</text><text x="4164.628px" y="1991.667px" style="font-family:'Helvetica';font-size:58.333px;fill:#525560;">can make a real city-wide dent.</text><rect x="0" y="2266.667" width="5333.333" height="500" style="fill:#013f3a;"/><text x="560.181px" y="2475px" style="font-family:'Georgia', serif;font-size:150px;fill:#fbb718;">16 000 kg</text><text x="520.143px" y="2591.667px" style="font-family:'Helvetica';font-size:54.167px;fill:#fff;fill-opacity:0.65;">organic waste diverted in 2025</text><path d="M1775,2333.333l0,366.667" style="fill:none;fill-rule:nonzero;stroke:#fff;stroke-opacity:0.15;stroke-width:4.17px;"/><text x="2380.802px" y="2475px" style="font-family:'Georgia', serif;font-size:150px;fill:#84cba3;">5 500 kg</text><text x="2258.75px" y="2591.667px" style="font-family:'Helvetica';font-size:54.167px;fill:#fff;fill-opacity:0.65;">of compost created for local farms</text><path d="M3558.333,2333.333l0,366.667" style="fill:none;fill-rule:nonzero;stroke:#fff;stroke-opacity:0.15;stroke-width:4.17px;"/><text x="4086.251px" y="2475px" style="font-family:'Georgia', serif;font-size:150px;fill:#fff;">37 000 km</text><text x="4119.167px" y="2591.667px" style="font-family:'Helvetica';font-size:54.167px;fill:#fff;fill-opacity:0.65;">worth of emissions avoided</text><text x="2207.278px" y="2725px" style="font-family:'Helvetica';font-size:41.667px;fill:#fff;fill-opacity:0.28;">2<tspan x="2230.868px 2254.457px 2278.047px 2301.637px 2313.63px 2325.623px 2360.748px 2385.884px 2414.092px 2444.599px 2469.735px 2481.728px 2523.811px 2533.525px 2561.733px 2585.323px 2611.191px 2641.698px 2669.906px 2700.413px 2708.785px 2736.993px 2748.986px 2781.812px 2814.639px 2847.465px 2859.458px 2871.451px 2901.958px 2930.166px 2958.374px 2986.582px 2997.843px 3022.979px 3055.805px 3095.549px " y="2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px 2725px ">025 IMPACT — ALFRED&apos;S GOOI CAPE TOWN</tspan></text></svg>