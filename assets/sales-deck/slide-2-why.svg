<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- Background -->
  <rect width="1280" height="720" fill="white"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="720" fill="#013f3a"/>

  <!-- Section label -->
  <text x="36" y="56"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="10" letter-spacing="2.5" fill="#108A63" font-weight="600">WHY IT MATTERS</text>

  <!-- Title -->
  <text x="36" y="112"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="52" font-weight="bold" fill="#013f3a">Food waste is a bigger problem</text>
  <text x="36" y="168"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="52" font-weight="bold" fill="#013f3a">than most people realise.</text>

  <!-- ─── Column 1: Landfill ─── -->
  <!-- icon circle -->
  <circle cx="184" cy="308" r="44" fill="#f0f7f4"/>
  <text x="184" y="324" text-anchor="middle" font-size="36">🗑️</text>

  <text x="184" y="390" text-anchor="middle"
        font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#013f3a">Landfill is the problem</text>
  <text x="184" y="418" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">30–50% of household waste</text>
  <text x="184" y="438" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">is organic — and in landfill,</text>
  <text x="184" y="458" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">it produces methane: a gas</text>
  <text x="184" y="478" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">80× more potent than CO₂.</text>

  <!-- ─── Divider ─── -->
  <line x1="368" y1="264" x2="368" y2="500" stroke="#e8e8e8" stroke-width="1"/>

  <!-- ─── Column 2: Soil ─── -->
  <circle cx="640" cy="308" r="44" fill="#f0f7f4"/>
  <text x="640" y="324" text-anchor="middle" font-size="36">🌱</text>

  <text x="640" y="390" text-anchor="middle"
        font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#013f3a">Composting is the fix</text>
  <text x="640" y="418" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">Composted organic waste</text>
  <text x="640" y="438" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">returns nutrients to soil —</text>
  <text x="640" y="458" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">supporting local farmers and</text>
  <text x="640" y="478" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">reducing synthetic fertiliser.</text>

  <!-- ─── Divider ─── -->
  <line x1="912" y1="264" x2="912" y2="500" stroke="#e8e8e8" stroke-width="1"/>

  <!-- ─── Column 3: Buildings ─── -->
  <circle cx="1096" cy="308" r="44" fill="#f0f7f4"/>
  <text x="1096" y="324" text-anchor="middle" font-size="36">🏢</text>

  <text x="1096" y="390" text-anchor="middle"
        font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#013f3a">Buildings are the opportunity</text>
  <text x="1096" y="418" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">Apartment blocks generate</text>
  <text x="1096" y="438" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">large, consistent volumes.</text>
  <text x="1096" y="458" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">A single building can make</text>
  <text x="1096" y="478" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="14" fill="#525560">a measurable city-wide dent.</text>

  <!-- ─── Impact stat bar ─── -->
  <rect x="0" y="544" width="1280" height="120" fill="#013f3a"/>

  <!-- 3 stats in the bar -->
  <text x="213" y="594" text-anchor="middle"
        font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#FBB718">16 000 kg</text>
  <text x="213" y="622" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.65)">organic waste diverted in 2025</text>

  <line x1="426" y1="560" x2="426" y2="648" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="640" y="594" text-anchor="middle"
        font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#84cba3">5 500 kg</text>
  <text x="640" y="622" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.65)">of compost created for local farms</text>

  <line x1="854" y1="560" x2="854" y2="648" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="1067" y="594" text-anchor="middle"
        font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white">37 000 km</text>
  <text x="1067" y="622" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.65)">worth of emissions avoided</text>

  <text x="640" y="654" text-anchor="middle"
        font-family="-apple-system, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.28)" letter-spacing="1">2025 IMPACT — ALFRED'S GOOI CAPE TOWN</text>

  <!-- Slide number -->
  <text x="1244" y="710" text-anchor="end"
        font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="rgba(255,255,255,0.20)">2 / 4</text>

</svg>
