<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">

  <!-- ═══════════════════════════════════════════
       HERO — dark green
  ═══════════════════════════════════════════ -->
  <rect x="0" y="0" width="595" height="188" fill="#013f3a"/>

  <!-- decorative organic circles -->
  <circle cx="528" cy="42" r="68" fill="rgba(132,203,163,0.10)"/>
  <circle cx="574" cy="8"  r="44" fill="rgba(132,203,163,0.07)"/>
  <circle cx="498" cy="98" r="38" fill="rgba(132,203,163,0.07)"/>

  <!-- gooi wordmark -->
  <text x="32" y="43"
        font-family="Georgia, 'Libre Baskerville', 'Times New Roman', serif"
        font-style="italic" font-size="26" font-weight="bold" fill="#FBB718">gooi*</text>

  <!-- badge pill -->
  <rect x="32" y="54" width="176" height="17" rx="8.5"
        fill="rgba(132,203,163,0.18)" stroke="rgba(132,203,163,0.40)" stroke-width="0.75"/>
  <text x="120" y="66"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="8.5" fill="#84cba3" text-anchor="middle"
        letter-spacing="1.8" font-weight="600">KITCHEN SCRAPS COLLECTION</text>

  <!-- headline -->
  <text x="32" y="114"
        font-family="Georgia, 'Libre Baskerville', 'Times New Roman', serif"
        font-size="38" font-weight="bold" fill="white">Your building is now</text>
  <text x="32" y="156"
        font-family="Georgia, 'Libre Baskerville', 'Times New Roman', serif"
        font-size="38" font-weight="bold" fill="#84cba3">composting.</text>

  <!-- building name -->
  <text x="32" y="178"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.52)" letter-spacing="0.4">
    Church Square Apartments · Cape Town
  </text>


  <!-- ═══════════════════════════════════════════
       INTRO — white
  ═══════════════════════════════════════════ -->
  <rect x="0" y="188" width="595" height="96" fill="white"/>

  <text x="32" y="219"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="14.5" font-weight="600" fill="#013f3a">
    We've set up a weekly kitchen scrap collection for your building.
  </text>
  <text x="32" y="241"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#525560">
    Every Monday Alfred collects and takes your scraps to a local composting
  </text>
  <text x="32" y="259"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#525560">
    facility. Your food waste returns to Cape Town's soil — not the landfill.
  </text>


  <!-- ═══════════════════════════════════════════
       STATS STRIP — light gray
  ═══════════════════════════════════════════ -->
  <rect x="0" y="284" width="595" height="68" fill="#F4F4F4"/>

  <!-- stat 1: units -->
  <text x="100" y="313"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="27" font-weight="bold" fill="#013f3a" text-anchor="middle">30</text>
  <text x="100" y="330"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" fill="#525560" text-anchor="middle" letter-spacing="1">UNITS IN THIS BLOCK</text>

  <line x1="200" y1="296" x2="200" y2="340" stroke="#ddd" stroke-width="1"/>

  <!-- stat 2: litres -->
  <text x="298" y="313"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="27" font-weight="bold" fill="#013f3a" text-anchor="middle">180L</text>
  <text x="298" y="330"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" fill="#525560" text-anchor="middle" letter-spacing="1">EXPECTED PER WEEK</text>

  <line x1="396" y1="296" x2="396" y2="340" stroke="#ddd" stroke-width="1"/>

  <!-- stat 3: collection day -->
  <text x="498" y="313"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="27" font-weight="bold" fill="#013f3a" text-anchor="middle">Monday</text>
  <text x="498" y="330"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" fill="#525560" text-anchor="middle" letter-spacing="1">COLLECTION DAY</text>


  <!-- ═══════════════════════════════════════════
       HOW IT WORKS — white
  ═══════════════════════════════════════════ -->
  <rect x="0" y="352" width="595" height="194" fill="white"/>

  <text x="298" y="383"
        font-family="Georgia, 'Libre Baskerville', serif"
        font-size="20" font-weight="bold" fill="#013f3a" text-anchor="middle">How it works</text>

  <!-- step icons -->
  <text x="99"  y="422" font-size="30" text-anchor="middle">🥬</text>
  <text x="298" y="422" font-size="30" text-anchor="middle">🪣</text>
  <text x="497" y="422" font-size="30" text-anchor="middle">🌱</text>

  <!-- arrows -->
  <text x="199" y="413" font-size="16" fill="#84cba3" text-anchor="middle" font-weight="300">→</text>
  <text x="398" y="413" font-size="16" fill="#84cba3" text-anchor="middle" font-weight="300">→</text>

  <!-- step 1 -->
  <text x="99" y="447" font-family="-apple-system, Arial, sans-serif"
        font-size="12.5" font-weight="700" fill="#013f3a" text-anchor="middle">Collect your scraps</text>
  <text x="99" y="464" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Fruit, veg, coffee grounds,</text>
  <text x="99" y="479" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">eggshells. In your new</text>
  <text x="99" y="494" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">countertop bucket.</text>
  <text x="99" y="509" font-family="-apple-system, Arial, sans-serif"
        font-size="10.5" fill="#aaa" text-anchor="middle">No meat or dairy.</text>

  <!-- step 2 -->
  <text x="298" y="447" font-family="-apple-system, Arial, sans-serif"
        font-size="12.5" font-weight="700" fill="#013f3a" text-anchor="middle">Put your bag out</text>
  <text x="298" y="464" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Empty your bucket into a</text>
  <text x="298" y="479" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">compostable bag. Leave it</text>
  <text x="298" y="494" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">at the agreed spot before</text>
  <text x="298" y="509" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Monday morning.</text>

  <!-- step 3 -->
  <text x="497" y="447" font-family="-apple-system, Arial, sans-serif"
        font-size="12.5" font-weight="700" fill="#013f3a" text-anchor="middle">It becomes compost</text>
  <text x="497" y="464" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Alfred collects and takes</text>
  <text x="497" y="479" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">your scraps to a local</text>
  <text x="497" y="494" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">composting facility —</text>
  <text x="497" y="509" font-family="-apple-system, Arial, sans-serif"
        font-size="11" fill="#666" text-anchor="middle">back to Cape Town's soil.</text>


  <!-- ═══════════════════════════════════════════
